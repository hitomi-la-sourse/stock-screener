<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0d1f">
  <title>急騰株ランキング</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#0d0d1f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;gap:24px}
    h1{font-size:20px;color:#ff5c5c}
    p{color:#666;font-size:14px;line-height:1.8}
    .qr-section{background:#13132b;padding:16px;border-radius:13px;border:1px solid #22224a;text-align:center;width:100%;max-width:280px}
    .qr-section h3{font-size:13px;color:#888;margin-bottom:12px;font-weight:600}
    .qr-wrap{display:inline-block;padding:10px;background:#fff;border-radius:10px;line-height:0}
    .qr-url{font-size:10px;color:#555;word-break:break-all;margin-top:10px}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div>
    <h1>🚀 短期急騰株ランキング</h1>
    <p>初回スクリーニング実行待ちです。<br>GitHub Actions を手動実行するか、<br>次の平日 14:00 JST にお待ちください。</p>
  </div>

  <div class="qr-section">
    <h3>📲 このページのQRコード（iPhoneで開く）</h3>
    <div class="qr-wrap">
      <div id="qrcode"></div>
    </div>
    <div class="qr-url" id="qrUrl"></div>
  </div>

  <script>
    (function() {
      var url = location.href.split('?')[0].split('#')[0];
      document.getElementById('qrUrl').textContent = url;
      new QRCode(document.getElementById('qrcode'), {
        text: url,
        width: 180,
        height: 180,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    })();
  </script>
</body>
</html>
